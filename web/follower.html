<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live · Scorekeeper</title>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0b1014" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0b1014; --field:#0f1a16; --panel:#141c22; --panel-2:#1b242b; --line:#2a363f;
    --ink:#eef3f2; --muted:#8aa0a0; --dim:#5f7373; --amber:#f2a93b; --green:#3aa564;
    --green-deep:#1f6d40; --red:#e0584f; --chalk:#d8e0dd;
    --display:"Saira Condensed",sans-serif; --body:"Hanken Grotesk",sans-serif; --mono:"JetBrains Mono",monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body { font-family:var(--body); background:radial-gradient(120% 80% at 50% -10%, #16221d 0%, var(--bg) 55%), var(--bg); color:var(--ink); min-height:100vh; display:flex; justify-content:center; padding:18px 12px 40px; }
  .wrap { width:100%; max-width:440px; }

  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .brand { font-family:var(--display); letter-spacing:.1em; text-transform:uppercase; font-size:14px; color:var(--chalk); font-weight:600; }
  .conn { display:inline-flex; align-items:center; gap:7px; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .conn .led { width:8px; height:8px; border-radius:50%; background:var(--dim); }
  .conn.live .led { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
  .conn.reconnecting .led { background:var(--amber); box-shadow:0 0 8px var(--amber); }
  .conn.error .led { background:var(--red); box-shadow:0 0 8px var(--red); }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

  .board { background:linear-gradient(180deg,#10171c,#0c1216); border:1px solid var(--line); border-radius:18px; overflow:hidden; }
  .score-row { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; }
  .score-row + .score-row { border-top:1px solid var(--line); }
  .team { display:flex; align-items:center; gap:10px; }
  .dot-bat { width:8px; height:8px; border-radius:50%; background:transparent; }
  .dot-bat.on { background:var(--amber); box-shadow:0 0 10px var(--amber); }
  .team-name { font-family:var(--display); font-weight:500; letter-spacing:.06em; text-transform:uppercase; font-size:20px; color:var(--chalk); }
  .runs { font-family:var(--display); font-weight:700; font-size:36px; line-height:1; font-variant-numeric:tabular-nums; }

  .strip { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-top:1px solid var(--line); background:#0c1216; }
  .inning { font-family:var(--display); letter-spacing:.08em; text-transform:uppercase; font-size:15px; color:var(--amber); font-weight:600; }
  .outs { display:flex; align-items:center; gap:7px; }
  .outs .lbl { font-size:10px; letter-spacing:.14em; color:var(--dim); text-transform:uppercase; }
  .out-dot { width:10px; height:10px; border-radius:50%; border:1.5px solid var(--dim); }
  .out-dot.on { background:var(--red); border-color:var(--red); }

  .mid { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:14px 16px; }
  .count .lbl { font-size:10px; letter-spacing:.18em; color:var(--dim); text-transform:uppercase; }
  .count .nums { font-family:var(--display); font-weight:700; font-size:42px; line-height:.95; font-variant-numeric:tabular-nums; }
  .count .nums .sep { color:var(--dim); font-weight:400; }
  .diamond { flex:0 0 110px; }

  .atbat { display:flex; justify-content:space-between; gap:10px; padding:0 16px 14px; }
  .atbat .who { font-size:10px; letter-spacing:.12em; color:var(--dim); text-transform:uppercase; }
  .atbat .nm { font-family:var(--display); font-size:18px; font-weight:600; }
  .atbat .r { text-align:right; }

  .sec-h { font-size:10px; letter-spacing:.16em; color:var(--dim); text-transform:uppercase; margin:18px 0 8px; display:flex; justify-content:space-between; }
  .log { display:flex; flex-direction:column; gap:6px; }
  .log .ln { display:flex; gap:10px; font-size:14px; }
  .log .tg { color:var(--amber-deep,#b97812); min-width:28px; font-family:var(--mono); font-size:11px; padding-top:2px; color:#b97812; }
  .log .tx { color:var(--chalk); }
  .empty { color:var(--dim); font-style:italic; font-size:13px; }
  .updated { font-size:11px; color:var(--dim); margin-top:14px; text-align:center; }
  .gate { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:20px; }
  .gate input { width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line); background:var(--panel-2); color:var(--ink); font-size:14px; margin:10px 0; }
  .gate button { width:100%; padding:11px; border-radius:9px; border:1px solid var(--green-deep); background:#15241b; color:var(--ink); font-weight:600; font-size:14px; cursor:pointer; }
  a { color:var(--amber); }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="brand">● Live</span>
    <span class="conn" id="conn"><i class="led"></i><span id="connText">Connecting…</span></span>
  </div>

  <div id="app" style="display:none">
    <div class="board">
      <div class="score-row">
        <div class="team"><span class="dot-bat" id="batAway"></span><span class="team-name" id="nameAway">Away</span></div>
        <span class="runs" id="scoreAway">0</span>
      </div>
      <div class="score-row">
        <div class="team"><span class="dot-bat" id="batHome"></span><span class="team-name" id="nameHome">Home</span></div>
        <span class="runs" id="scoreHome">0</span>
      </div>
      <div class="strip">
        <span class="inning" id="inning">▲ Top 1st</span>
        <div class="outs"><span class="lbl">Outs</span><span class="out-dot" data-o="0"></span><span class="out-dot" data-o="1"></span><span class="out-dot" data-o="2"></span></div>
      </div>
      <div class="mid">
        <div class="count">
          <div class="lbl">Count</div>
          <div class="nums"><span id="balls">0</span><span class="sep">–</span><span id="strikes">0</span></div>
        </div>
        <svg class="diamond" id="diamond" viewBox="0 0 120 120" aria-label="bases"></svg>
      </div>
      <div class="atbat">
        <div><div class="who">At bat</div><div class="nm" id="batterName">—</div></div>
        <div class="r"><div class="who">Pitching</div><div class="nm" id="pitcherName">—</div></div>
      </div>
    </div>

    <div class="sec-h">Play-by-play</div>
    <div class="log" id="log"><div class="empty">Waiting for the first play…</div></div>
    <div class="updated" id="updated"></div>
  </div>

  <div id="gate" class="gate" style="display:none">
    <div class="brand" style="margin-bottom:6px">Follow a live game</div>
    <div style="font-size:13px;color:var(--muted)">Enter the game ID the scorer shared (or open the follower link from the scoring app).</div>
    <input id="gameInput" placeholder="game id" />
    <button id="gateGo">Watch live</button>
  </div>
</div>

<script type="module">
import { reduce, currentBatter, currentPitcher } from "./dist/engine.js";
import { playLog } from "./playlog.js";

const params = new URLSearchParams(location.search);
const API_BASE = params.get("api") || "";
const gameId = params.get("game");

const ORD = ["1st","2nd","3rd","4th","5th","6th","7th","8th","9th","10th","11th","12th"];
let setup = null, events = [], nameById = {}, seen = new Set();
let lastUpdate = 0, conn = "connecting", es = null;

const nameOf = (id) => nameById[id] || id;

function drawDiamond(bases){
  const occ = new Set(bases);
  const pts = {1:{x:96,y:60},2:{x:60,y:24},3:{x:24,y:60}};
  const sq=(c,on)=>'<rect x="'+(c.x-9)+'" y="'+(c.y-9)+'" width="18" height="18" rx="3" transform="rotate(45 '+c.x+' '+c.y+')" fill="'+(on?"var(--green)":"#0a0f12")+'" stroke="'+(on?"var(--green-deep)":"var(--line)")+'" stroke-width="1.5"/>';
  const lines='<path d="M60 96 L96 60 L60 24 L24 60 Z" fill="none" stroke="#22302b" stroke-width="1.5"/>';
  const home='<rect x="53" y="89" width="14" height="14" transform="rotate(45 60 96)" fill="#0a0f12" stroke="var(--line)" stroke-width="1.5"/>';
  return lines+sq(pts[2],occ.has(2))+sq(pts[1],occ.has(1))+sq(pts[3],occ.has(3))+home;
}

function setConn(state, text){
  conn = state;
  document.getElementById("conn").className = "conn " + state;
  document.getElementById("connText").textContent = text;
}

function render(){
  if(!setup) return;
  const s = reduce(setup, events);
  // server scoreboard gives occupied base numbers; derive locally for the diamond
  const occ = [1,2,3].filter((b)=>s.bases[b]!==undefined);
  document.getElementById("nameAway").textContent = setup.away.teamId;
  document.getElementById("nameHome").textContent = setup.home.teamId;
  document.getElementById("scoreAway").textContent = s.score.away;
  document.getElementById("scoreHome").textContent = s.score.home;
  document.getElementById("batAway").classList.toggle("on", s.battingTeam==="away");
  document.getElementById("batHome").classList.toggle("on", s.battingTeam==="home");
  document.getElementById("inning").textContent = (s.half==="top"?"▲ Top ":"▼ Bot ")+ORD[s.inning-1];
  for(let i=0;i<3;i++) document.querySelector('[data-o="'+i+'"]').classList.toggle("on", i<s.outs);
  document.getElementById("balls").textContent = s.count.balls;
  document.getElementById("strikes").textContent = s.count.strikes;
  document.getElementById("diamond").innerHTML = drawDiamond(occ);
  document.getElementById("batterName").textContent = nameOf(currentBatter(s));
  document.getElementById("pitcherName").textContent = nameOf(currentPitcher(s));
  const log = playLog(setup, events, nameOf);
  const el = document.getElementById("log");
  el.innerHTML = log.length
    ? log.map((l)=>'<div class="ln"><span class="tg">'+l.tag+'</span><span class="tx">'+l.tx+'</span></div>').join("")
    : '<div class="empty">Waiting for the first play…</div>';
  tickUpdated();
}

function tickUpdated(){
  const el = document.getElementById("updated");
  if(!lastUpdate){ el.textContent=""; return; }
  const secs = Math.max(0, Math.round((Date.now()-lastUpdate)/1000));
  el.textContent = "Last update " + (secs<2 ? "just now" : secs+"s ago");
}
setInterval(tickUpdated, 1000);

function buildNames(su){
  const m = {};
  for(const side of ["away","home"]) for(const slot of su[side].battingOrder) if(slot.name) m[slot.playerId]=slot.name;
  return m;
}

function connect(){
  const max = events.reduce((m,e)=>Math.max(m,e.seq),0);
  es = new EventSource(API_BASE + "/games/" + gameId + "/stream?lastEventId=" + max);
  es.addEventListener("open", ()=> setConn("live","Live"));
  es.addEventListener("play", (ev)=>{
    const env = JSON.parse(ev.data);
    if(seen.has(env.seq)) return;          // dedupe replays on resume
    seen.add(env.seq); events.push(env);
    lastUpdate = Date.now(); setConn("live","Live"); render();
  });
  es.addEventListener("state", ()=>{ lastUpdate = Date.now(); setConn("live","Live"); tickUpdated(); });
  es.onerror = ()=> setConn("reconnecting","Reconnecting…"); // EventSource retries; server replays via Last-Event-ID
}

async function boot(){
  if(!gameId){
    document.getElementById("gate").style.display = "block";
    setConn("error","Idle");
    document.getElementById("gateGo").addEventListener("click", ()=>{
      const id = document.getElementById("gameInput").value.trim();
      if(id) location.search = "?game=" + encodeURIComponent(id) + (API_BASE?("&api="+encodeURIComponent(API_BASE)):"");
    });
    return;
  }
  document.getElementById("app").style.display = "block";
  try{
    const r = await fetch(API_BASE + "/games/" + gameId + "/export.json");
    if(!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    setup = data.setup; events = data.events || [];
    for(const e of events) seen.add(e.seq);
    nameById = buildNames(setup);
    lastUpdate = Date.now();
    render();
    connect();
  }catch(err){
    setConn("error","Can't reach game");
    setTimeout(boot, 3000); // retry initial load
  }
}

boot();
</script>
</body>
</html>
